site:
  title: 'GraphRAG Workshop: Neo4j & AWS Bedrock'
  url: https://neo4j-partners.github.io/neo4j-bedrock-graphrag-workshop
  start_page: neo4j-bedrock-graphrag-workshop::index.adoc

content:
  sources:
  - url: ..
    branches: HEAD
    start_path: site

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./supplemental-ui

asciidoc:
